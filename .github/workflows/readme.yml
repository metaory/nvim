# Regenerate README from lua/metaory/plugins and LSP config.
# Runs on push when plugin/readme/script change, or manually.
name: readme

on:
  push:
    branches: [master, main]
    paths:
      - "lua/metaory/plugins/**"
      - "README.md"
      - ".github/scripts/gen-readme.sh"
      - ".github/workflows/readme.yml"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate README
        run: bash .github/scripts/gen-readme.sh > README.new

      - name: Update README if changed
        run: |
          if ! diff -q README.md README.new 2>/dev/null; then
            mv README.new README.md
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: regenerate README from plugins"
            git push
          else
            rm -f README.new
          fi
